<style>
    :root {
        --primary-color: #0d47a1;
        --primary-hover: #1565c0;
        --bg-body: #f0f2f5;
        --bg-container: #ffffff;
        --text-main: #1a1a1a;
        --text-muted: #64748b;
        --border-color: #e2e8f0;

    body {
        font-family: 'Inter', sans-serif;
        margin: 0;
        padding: 40px 20px;
        background: #0d47a1;
        color: var(--text-main);
        line-height: 1.5;
    }

    /* Lock Screen Overlay */
    #lock-screen {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: var(--primary-color);
        z-index: 1000000;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
    }
    .lock-box {
        background: white;
        padding: 40px;
        border-radius: 16px;
        color: var(--text-main);
        box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2);
        max-width: 400px;
        width: 90%;
        text-align: center;
    }
    .lock-box h2 { margin-bottom: 8px; color: var(--primary-color); }
    .lock-box input {
        width: 100%;
        padding: 12px 16px;
        margin: 20px 0;
        border: 2px solid var(--border-color);
        border-radius: 8px;
        font-size: 16px;
        transition: border-color 0.2s;
    }
    .lock-box input:focus { border-color: var(--primary-color); outline: none; }
    .lock-box button {
        width: 100%;
        padding: 12px;
        background: var(--primary-color);
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 600;
        font-size: 16px;
        transition: background 0.2s;
    }
    .lock-box button:hover { background: var(--primary-hover); }

    .container {
        max-width: 1000px;
        margin: auto;
        background: var(--bg-container);
        padding: 40px;
        border-radius: 16px;
        box-shadow: var(--shadow);
    }

    h2 { 
        font-weight: 700; 
        color: var(--primary-color);
        border-bottom: 2px solid var(--border-color);
        padding-bottom: 10px;
        margin-bottom: 25px;
    }

    .form-group {
        margin-bottom: 20px;
    }

    label {
        display: block;
        font-weight: 600;
        margin-bottom: 8px;
        font-size: 14px;
        color: var(--text-main);
    }

    input[type="text"], input[type="number"] {
        width: 100%;
        max-width: 400px;
        padding: 10px 14px;
        border: 1px solid var(--border-color);
        border-radius: 8px;
        font-size: 15px;
        background: #f8fafc;
        transition: all 0.2s;
    }
    input[type="text"]:focus, input[type="number"]:focus {
        background: #fff;
        border-color: var(--primary-color);
        box-shadow: 0 0 0 3px rgba(13, 71, 161, 0.1);
        outline: none;
    }

    .nav-buttons {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin: 25px 0;
    }

    .nav-buttons button {
        background: #f1f5f9;
        color: var(--primary-color);
        border: 1px solid var(--border-color);
        font-weight: 500;
    }
    .nav-buttons button:hover {
        background: #e2e8f0;
    }

    .format-options {
        display: flex;
        gap: 20px;
        flex-wrap: wrap;
        background: #f8fafc;
        padding: 20px;
        border-radius: 12px;
        border: 1px solid var(--border-color);
        margin-bottom: 25px;
    }

    .format-options label {
        display: flex;
        align-items: center;
        gap: 8px;
        cursor: pointer;
        font-weight: 500;
        margin-bottom: 0;
    }

    .zone {
        margin-bottom: 20px;
        padding: 20px;
        background: #ffffff;
        border: 1px solid var(--border-color);
        border-radius: 12px;
        transition: transform 0.2s;

    .zone:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); }

    #zone-noon h3 { color: #ca8a04; }
    #zone-prime h3 { color: #7c3aed; }
    #zone-general h3 { color: #0d9488; }

    .zone h3 {

        align-items: center;
        gap: 10px;
        margin-top: 0;
        font-size: 18px;
        font-weight: 700;
    }

    .zone-actions {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 15px;

    .btn-toggle {

        font-size: 12px;
        background: #f1f5f9;
        color: #475569;
        border-radius: 6px;
    }

    .show-list {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));

    }

    .show-item {

        align-items: center;

        background: #f8fafc;

        document.getElementById("lock-screen").style.display = "none";

        errorMsg.style.display = "block";

function formatEuroDate(iso) {
    if (!iso) return "";
    const [y, m, d] = iso.split("-");
    return `${d}/${m}/${y}`;
}

function parseDate(str) {
    if (!str) return null;
    return new Date(str);
}

function daysBetween(a, b) {
    return Math.floor((b - a) / (1000 * 60 * 60 * 24)) + 1;
}

function validateAvailability(selectedShows, dateFrom, dateTo) {
    const warnings = [];
    selectedShows.forEach(cb => {
        const name = cb.dataset.name;
        const from = cb.dataset.from;
        const to = cb.dataset.to;
        const showFrom = new Date(from);
        const showTo = new Date(to);
        if (dateFrom && dateFrom < showFrom) warnings.push(`${name}: από ${formatEuroDate(from)}`);
        if (dateTo && dateTo > showTo) warnings.push(`${name}: έως ${formatEuroDate(to)}`);
    });
    return warnings;
}

function renderShowsForFormat(format) {
    const data = showsByFormat[format];
    const prevSelected = new Set([...document.querySelectorAll('.show:checked')].map(cb => cb.dataset.name));
    const zones = [
        { key: "morning", divId: "morning-zone", zoneId: "zone-morning" },
        { key: "noon", divId: "noon-zone", zoneId: "zone-noon" },
        { key: "prime", divId: "prime-zone", zoneId: "zone-prime" },
        { key: "general", divId: "general-zone", zoneId: "zone-general" }
    ];
    zones.forEach(z => {
        const container = document.getElementById(z.divId);
        const zoneWrapper = document.getElementById(z.zoneId);
        container.innerHTML = "";
        const shows = (data && data[z.key]) ? data[z.key] : [];
        if (!shows.length) { zoneWrapper.style.display = "none"; return; }
        zoneWrapper.style.display = "block";
        shows.forEach(show => {
            const checked = prevSelected.has(show.name) ? "checked" : "";
            const html = `
                <label class="show-item">
                    <input type="checkbox" class="show ${z.key}" data-name="${show.name}" data-cpm="${show.cpm}" data-from="${show.from}" data-to="${show.to}" ${checked}>
                    <span>${show.name}</span>
                    <span class="show-dates">${formatEuroDate(show.from)} - ${formatEuroDate(show.to)}</span>
                </label>`;
            container.insertAdjacentHTML("beforeend", html);
        });
    });
}

let lastResultText = "";

function calculate() {
    const ros = document.getElementById('ros').checked;
    const format = document.querySelector("input[name='format']:checked").value;
    const selected = document.querySelectorAll('.show:checked');
    const impsField = document.getElementById('impressions');
    const costField = document.getElementById('cost');
    const centralImps = parseFloat(impsField.value);
    const costInput = parseFloat(costField.value);
    const dateFrom = parseDate(document.getElementById("dateFrom").value);
    const dateTo = parseDate(document.getElementById("dateTo").value);

    let availabilityWarnings = [];
    if (dateFrom && dateTo && selected.length > 0) availabilityWarnings = validateAvailability([...selected], dateFrom, dateTo);

    if (selected.length === 0 && !ros) {
        document.getElementById("result").textContent = "Επιλέξτε εκπομπές ή ROS για υπολογισμό.";
        return;
    }

    let avgCPM = 0;
    if (format === "Web TV Banner") {
        if (ros) avgCPM = 4;
        else {
            const selectedArr = [...selected];
            const names = selectedArr.map(cb => cb.dataset.name.toLowerCase());
            const isPremium = n => n.includes("survivor") || n.includes("the voice");
            const hasPremium = names.some(isPremium);
            const allPremium = selectedArr.length > 0 && names.every(isPremium);
            if (allPremium) avgCPM = 4.5; else if (hasPremium) avgCPM = 4; else avgCPM = 3.5;
        }
    } else if (ros || format === "Pre-roll Hybrid App") {
        avgCPM = 16;
    } else {
        let sum = 0;
        selected.forEach(cb => {
            let base = parseFloat(cb.dataset.cpm);
            if (format === "Π/C-Banner Hybrid Linear") {
                if (cb.classList.contains("prime")) base += 2; else base += 1;
            }
            sum += base;
        });
        avgCPM = sum / selected.length;
    }

    let totalDays = 1, normalDays = 1, seasonalDays = 0;
    if (dateFrom && dateTo && dateTo >= dateFrom) {
        totalDays = daysBetween(dateFrom, dateTo);
        let currYear = dateFrom.getFullYear(), endYear = dateTo.getFullYear();
        while (currYear <= endYear) {
            const sStart = new Date(currYear, 6, 25), sEnd = new Date(currYear, 8, 4);
            const rStart = dateFrom > sStart ? dateFrom : sStart, rEnd = dateTo < sEnd ? dateTo : sEnd;
            if (rEnd >= rStart) seasonalDays += daysBetween(rStart, rEnd);
            currYear++;
        }
        normalDays = Math.max(0, totalDays - seasonalDays);
    }

    const seasonalityApplied = (seasonalDays > 0 && format !== "Web TV Banner");
    const result = document.getElementById("result");

    if (!isNaN(costInput) && costInput > 0) {
        let effCPM = seasonalityApplied ? (normalDays * avgCPM + seasonalDays * 14) / totalDays : avgCPM;
        let disc = false;
        if (costInput >= 3000) { effCPM *= 0.90; disc = true; }
        let impressions = (costInput / effCPM) * 1000;
        let hint = (!disc && costInput >= 1200 && costInput < 3000) ? `\n<span class="discount-hint">💡 Με budget 3.000€+ κερδίζετε 10% έκπτωση στο CPM.</span>` : "";

        lastResultText = `Σύνολο Impressions: ${Math.round(impressions).toLocaleString("el-GR")}\n` +
            `Κόστος: ${costInput.toLocaleString("el-GR")} €` +
            (disc ? `\n<span class="discount-info">✅ Εφαρμόστηκε έκπτωση 10% (Bonus Impressions)</span>` : "") +
            (seasonalityApplied ? `\n<span class="seasonality">☀️ Εφαρμόστηκε Seasonality CPM (25/7-4/9)</span>` : "") +
            hint + (availabilityWarnings.length ? `\n\n<span class="warning">⚠️ Προειδοποιήσεις:<br>${availabilityWarnings.join("<br>")}</span>` : "");
        result.innerHTML = lastResultText.replace(/\n/g, "<br>");
        return;
    }

    if (isNaN(centralImps) || centralImps <= 0) { result.textContent = "Συμπληρώστε Impressions ή Budget."; return; }

    const impsPerDay = centralImps / totalDays;
    let totalCost = (normalDays * impsPerDay * (avgCPM / 1000)) + (seasonalDays * impsPerDay * (seasonalityApplied ? 14 / 1000 : avgCPM / 1000));
    let disc = false, finalImps = centralImps;
    if (totalCost >= 3000) { disc = true; finalImps = Math.round((totalCost / (avgCPM * 0.9)) * 1000); }
    let hint = (!disc && totalCost >= 1200 && totalCost < 3000) ? `\n<span class="discount-hint">💡 Με budget 3.000€+ κερδίζετε 10% έκπτωση στο CPM.</span>` : "";

    lastResultText = `Σύνολο Impressions: ${finalImps.toLocaleString("el-GR")}\n` +
        `Τελικό Κόστος: ${totalCost.toLocaleString("el-GR", {minimumFractionDigits:2})} €` +
        (disc ? `\n<span class="discount-info">✅ Εφαρμόστηκε έκπτωση 10% (Bonus Impressions)</span>` : "") +
        (seasonalityApplied ? `\n<span class="seasonality">☀️ Εφαρμόστηκε Seasonality CPM (25/7-4/9)</span>` : "") +
        hint + (availabilityWarnings.length ? `\n\n<span class="warning">⚠️ Προειδοποιήσεις:<br>${availabilityWarnings.join("<br>")}</span>` : "");
    result.innerHTML = lastResultText.replace(/\n/g, "<br>");
}

function toggleZone(zCls) {
    const boxes = document.querySelectorAll('.' + zCls);
    if (!boxes.length) return;
    const allChecked = [...boxes].every(cb => cb.checked);
    boxes.forEach(cb => cb.checked = !allChecked);
    calculate();
}

function clearAll() {
    document.querySelectorAll('.show').forEach(cb => cb.checked = false);
    document.getElementById('ros').checked = false;
    document.getElementById('impressions').value = "";
    document.getElementById('cost').value = "";
    document.getElementById('impressions').disabled = false;
    document.getElementById('cost').disabled = false;
    document.getElementById('dateRange').value = "";
    document.getElementById('dateFrom').value = "";
    document.getElementById('dateTo').value = "";
    document.getElementById("result").textContent = "";
}

function sendEmail() {
    if (!lastResultText) { alert("Κάντε πρώτα έναν υπολογισμό."); return; }
    const adv = document.getElementById("advertiser").value, pl = document.getElementById("plan").value;
    const dFrom = formatEuroDate(document.getElementById("dateFrom").value), dTo = formatEuroDate(document.getElementById("dateTo").value);
    const sel = [...document.querySelectorAll('.show:checked')].map(cb => cb.dataset.name).join(", ");
    const fmt = document.querySelector("input[name='format']:checked").value;
    const body = `Διαφημιζόμενος: ${adv}\nΠλάνο: ${pl}\nΗμερομηνίες: ${dFrom}-${dTo}\nFormat: ${fmt}\nROS: ${document.getElementById("ros").checked?"Ναι":"Όχι"}\nΕκπομπές: ${sel}\n\n${lastResultText.replace(/<[^>]+>/g, '')}`;
    window.location.href = `mailto:ckassos@skai.gr?subject=${encodeURIComponent("Πλάνο "+fmt)}&body=${encodeURIComponent(body)}`;
}

$(function() {
    $('#dateRange').daterangepicker({
        autoUpdateInput: false,
        // Προσθήκη έτοιμων επιλογών
        ranges: {
           'Επόμενες 15 ημέρες': [moment(), moment().add(14, 'days')],
           'Επόμενος Μήνας': [moment().add(1, 'month').startOf('month'), moment().add(1, 'month').endOf('month')]
        },
        locale: { 
            format: 'DD/MM/YYYY', 
            applyLabel: 'Εφαρμογή', 
            cancelLabel: 'Άκυρο', 
            customRangeLabel: 'Επιλέξτε χειροκίνητα', // Όνομα για την ελεύθερη επιλογή
            daysOfWeek: ['Κυ','Δε','Τρ','Τε','Πε','Πα','Σα'], 
            monthNames: ['Ιαν','Φεβ','Μαρ','Απρ','Μαι','Ιουν','Ιουλ','Αυγ','Σεπ','Οκτ','Νοε','Δεκ'] 
        }
    }).on('apply.daterangepicker', function(ev, picker) {
        $(this).val(picker.startDate.format('DD/MM/YYYY') + ' - ' + picker.endDate.format('DD/MM/YYYY'));
        document.getElementById("dateFrom").value = picker.startDate.format('YYYY-MM-DD');
        document.getElementById("dateTo").value = picker.endDate.format('YYYY-MM-DD');
        calculate();
    });
});

document.getElementById("ros").addEventListener("change", () => {
    if (document.getElementById("ros").checked) document.querySelectorAll(".show").forEach(cb => cb.checked = false);
    calculate();
});

document.addEventListener("change", (e) => {
    if (e.target.classList.contains("show")) {
        if (document.getElementById("ros").checked) document.getElementById("ros").checked = false;
        calculate();
    }
});

const impsField = document.getElementById('impressions'), costField = document.getElementById('cost');
impsField.addEventListener('input', () => { if(impsField.value){ costField.value=""; costField.disabled=true; } else costField.disabled=false; calculate(); });
costField.addEventListener('input', () => { if(costField.value){ impsField.value=""; impsField.disabled=true; } else impsField.disabled=false; calculate(); });

window.addEventListener("load", () => { renderShowsForFormat(document.querySelector('input[name="format"]:checked').value); calculate(); });
document.querySelectorAll('input[name="format"]').forEach(radio => { radio.addEventListener('change', () => { renderShowsForFormat(radio.value); calculate(); }); });
</script>
